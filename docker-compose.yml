version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nas-backend
    ports:
      - "8000:8000"
    volumes:
      - nas-data:/app/data
      - nas-backups:/app/backups
      - nas-logs:/app/logs
      - nas-assets:/app/assets
    environment:
      - DATABASE_URL=sqlite:///data/nas.db
      - AUTH_ENABLED=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nas-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  nas-data:
  nas-backups:
  nas-logs:
  nas-assets:
