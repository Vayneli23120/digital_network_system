services:
  prometheus:
    image: prom/prometheus:latest
    container_name: netprom
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  snmp_exporter:
    image: prom/snmp-exporter:latest
    container_name: netsnmp
    restart: unless-stopped
    ports:
      - "9116:9116"
    volumes:
      - ./snmp_exporter/snmp.yml:/etc/snmp_exporter/snmp.yml:ro

  grafana:
    image: grafana/grafana-oss:latest
    container_name: netgrafana
    restart: unless-stopped
    ports:
      - "3001:3000"          # 宿主机 3001 → 容器 3000（避开前端 3000）
    environment:
      # 允许被 iframe 嵌入到自研系统页面
      - GF_SECURITY_ALLOW_EMBEDDING=true
      # 匿名只读（内网隔离环境，供嵌入展示；如需登录改这三项）
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_COOKIE_SAMESITE=none
      - GF_USERS_DEFAULT_THEME=light
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
