# snmp_exporter 配置 — 生成器格式（含指标索引）
auths:
  gyread:
    version: 2
    community: gyread
  public:
    version: 2
    community: public

modules:
  cisco_if:
    walk:
      - 1.3.6.1.2.1.2.2.1.2    # ifDescr
      - 1.3.6.1.2.1.2.2.1.7    # ifAdminStatus
      - 1.3.6.1.2.1.2.2.1.8    # ifOperStatus
      - 1.3.6.1.2.1.2.2.1.10   # ifInOctets
      - 1.3.6.1.2.1.2.2.1.14   # ifInErrors
      - 1.3.6.1.2.1.2.2.1.16   # ifOutOctets
      - 1.3.6.1.2.1.2.2.1.20   # ifOutErrors
      - 1.3.6.1.2.1.31.1.1.1.1   # ifName
      - 1.3.6.1.2.1.31.1.1.1.6   # ifHCInOctets
      - 1.3.6.1.2.1.31.1.1.1.7   # ifHCOutOctets
      - 1.3.6.1.2.1.31.1.1.1.15  # ifHighSpeed
      - 1.3.6.1.2.1.1.3        # sysUpTime
      - 1.3.6.1.2.1.1.5        # sysName
      - 1.3.6.1.2.1.1.1        # sysDescr
      - 1.3.6.1.4.1.9.9.109.1.1.1.1.8  # cpmCPUTotal5minRev
    metrics:
    # ── 接口表 ifEntry (1.3.6.1.2.1.2.2.1) ──
    - name: ifDescr
      oid: 1.3.6.1.2.1.2.2.1.2
      type: DisplayString
      help: 'Interface description'
      indexes:
      - labelname: ifIndex
        type: Integer
      lookups:
      - labels: [ifIndex]
        labelname: ifName
        oid: 1.3.6.1.2.1.31.1.1.1.1
        type: DisplayString
    - name: ifAdminStatus
      oid: 1.3.6.1.2.1.2.2.1.7
      type: Integer
      help: 'Desired interface state'
      indexes:
      - labelname: ifIndex
        type: Integer
      lookups:
      - labels: [ifIndex]
        labelname: ifName
        oid: 1.3.6.1.2.1.31.1.1.1.1
        type: DisplayString
    - name: ifOperStatus
      oid: 1.3.6.1.2.1.2.2.1.8
      type: Integer
      help: 'Current operational state'
      indexes:
      - labelname: ifIndex
        type: Integer
      lookups:
      - labels: [ifIndex]
        labelname: ifName
        oid: 1.3.6.1.2.1.31.1.1.1.1
        type: DisplayString
    - name: ifInOctets
      oid: 1.3.6.1.2.1.2.2.1.10
      type: Counter32
      help: 'Total octets received'
      indexes:
      - labelname: ifIndex
        type: Integer
      lookups:
      - labels: [ifIndex]
        labelname: ifName
        oid: 1.3.6.1.2.1.31.1.1.1.1
        type: DisplayString
    - name: ifInErrors
      oid: 1.3.6.1.2.1.2.2.1.14
      type: Counter32
      help: 'Inbound errors'
      indexes:
      - labelname: ifIndex
        type: Integer
      lookups:
      - labels: [ifIndex]
        labelname: ifName
        oid: 1.3.6.1.2.1.31.1.1.1.1
        type: DisplayString
    - name: ifOutOctets
      oid: 1.3.6.1.2.1.2.2.1.16
      type: Counter32
      help: 'Total octets transmitted'
      indexes:
      - labelname: ifIndex
        type: Integer
      lookups:
      - labels: [ifIndex]
        labelname: ifName
        oid: 1.3.6.1.2.1.31.1.1.1.1
        type: DisplayString
    - name: ifOutErrors
      oid: 1.3.6.1.2.1.2.2.1.20
      type: Counter32
      help: 'Outbound errors'
      indexes:
      - labelname: ifIndex
        type: Integer
      lookups:
      - labels: [ifIndex]
        labelname: ifName
        oid: 1.3.6.1.2.1.31.1.1.1.1
        type: DisplayString

    # ── 扩展接口表 ifXEntry (1.3.6.1.2.1.31.1.1.1) ──
    - name: ifName
      oid: 1.3.6.1.2.1.31.1.1.1.1
      type: DisplayString
      help: 'Interface name (e.g. Gi0/0)'
      indexes:
      - labelname: ifIndex
        type: Integer
    - name: ifHCInOctets
      oid: 1.3.6.1.2.1.31.1.1.1.6
      type: Counter64
      help: 'Total octets received (64-bit)'
      indexes:
      - labelname: ifIndex
        type: Integer
      lookups:
      - labels: [ifIndex]
        labelname: ifName
        oid: 1.3.6.1.2.1.31.1.1.1.1
        type: DisplayString
    - name: ifHCOutOctets
      oid: 1.3.6.1.2.1.31.1.1.1.7
      type: Counter64
      help: 'Total octets transmitted (64-bit)'
      indexes:
      - labelname: ifIndex
        type: Integer
      lookups:
      - labels: [ifIndex]
        labelname: ifName
        oid: 1.3.6.1.2.1.31.1.1.1.1
        type: DisplayString
    - name: ifHighSpeed
      oid: 1.3.6.1.2.1.31.1.1.1.15
      type: Gauge32
      help: 'Bandwidth estimate in Mbps'
      indexes:
      - labelname: ifIndex
        type: Integer
      lookups:
      - labels: [ifIndex]
        labelname: ifName
        oid: 1.3.6.1.2.1.31.1.1.1.1
        type: DisplayString

    # ── 系统标量 (1.3.6.1.2.1.1) ──
    - name: sysUpTime
      oid: 1.3.6.1.2.1.1.3
      type: TimeTicks
      help: 'System uptime'
    - name: sysName
      oid: 1.3.6.1.2.1.1.5
      type: DisplayString
      help: 'System name'
    - name: sysDescr
      oid: 1.3.6.1.2.1.1.1
      type: DisplayString
      help: 'System description'

    # ── Cisco CPU (CISCO-PROCESS-MIB) ──
    - name: cpmCPUTotal5minRev
      oid: 1.3.6.1.4.1.9.9.109.1.1.1.1.8
      type: Gauge32
      help: 'Five-minute CPU utilization percentage'
      indexes:
      - labelname: cpmCPUTotalIndex
        type: Integer
