<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫码枪终端 - Network Automation System</title>
    <style>
        /* 系统设计变量 */
        :root {
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --gap-sm: 8px;
            --gap-md: 16px;

            /* 品牌色 */
            --accent-primary: #00d4aa;
            --accent-secondary: #00a8ff;
            --accent-warning: #ffb800;
            --accent-danger: #ff4757;

            /* 状态色 */
            --status-active: #00d4aa;
            --status-idle: #6b7280;

            /* 明亮主题 */
            --bg-primary: #f0f4fa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #f1f5f9;
            --text-primary: #0D1B2A;
            --text-secondary: #3A4A5C;
            --text-muted: #9BAABB;
            --border-default: #E2E8F2;
            --shadow-card: 0 1px 3px rgba(0, 48, 135, 0.06), 0 1px 2px rgba(0, 48, 135, 0.04);

            --color-gb: #003087;
            --color-gb-deep: #001F5C;
            --color-gy: #FFCC00;
        }

        /* 暗黑主题 */
        .dark {
            --bg-primary: #0a0e14;
            --bg-secondary: #0d1117;
            --bg-card: #1a1f26;
            --bg-hover: #21262d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --border-default: #30363d;
            --shadow-card: 0 0 0 1px #30363d, 0 4px 12px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: var(--gap-md);
        }

        /* 顶部导航条 */
        .topbar {
            background: linear-gradient(135deg, var(--color-gb) 0%, var(--color-gb-deep) 100%);
            padding: var(--gap-sm) var(--gap-md);
            border-radius: var(--radius-lg);
            margin-bottom: var(--gap-md);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .topbar-title {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .topbar-accent {
            color: var(--color-gy);
            font-size: 14px;
            margin-left: var(--gap-sm);
        }

        /* 容器 */
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: var(--gap-md);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
        }

        h1 {
            font-size: 20px;
            text-align: center;
            margin-bottom: var(--gap-sm);
            color: var(--text-primary);
        }

        h2 {
            font-size: 18px;
            text-align: center;
            color: var(--accent-primary);
            margin-bottom: var(--gap-sm);
        }

        .tip {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: var(--gap-md);
        }

        .session-info {
            text-align: center;
            margin-bottom: var(--gap-md);
            padding: var(--gap-md);
            background: var(--bg-hover);
            border-radius: var(--radius-md);
        }

        .session-info p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .session-code {
            color: var(--accent-primary);
            font-weight: 600;
            font-size: 16px;
        }

        .session-type-badge {
            display: inline-block;
            background: rgba(0, 212, 170, 0.1);
            color: var(--accent-primary);
            padding: 4px 12px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            margin-bottom: var(--gap-sm);
        }

        /* 输入框 */
        input {
            width: 100%;
            height: 48px;
            font-size: 16px;
            padding: 12px 16px;
            border: 2px solid var(--border-default);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent-primary);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        /* 按钮 */
        .btn {
            width: 100%;
            height: 48px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            margin-top: var(--gap-sm);
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: #fff;
        }

        .btn-primary:hover:not(:disabled) {
            background: #00c4a0;
        }

        .btn-primary:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        .btn-danger {
            background: var(--accent-danger);
            color: #fff;
            margin-top: var(--gap-md);
        }

        .btn-danger:hover {
            background: #e64550;
        }

        /* 扫码列表 */
        .scan-list {
            background: var(--bg-hover);
            padding: var(--gap-md);
            border-radius: var(--radius-md);
            min-height: 100px;
            margin-top: var(--gap-md);
        }

        .scan-list h3 {
            font-size: 14px;
            margin-bottom: var(--gap-sm);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: var(--gap-sm);
        }

        .item-count {
            background: var(--accent-primary);
            color: #fff;
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            font-size: 12px;
        }

        .item-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            padding: 12px var(--gap-md);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-default);
            margin-bottom: var(--gap-sm);
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .serial {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
        }

        .name {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .qty {
            color: var(--accent-primary);
            font-size: 12px;
        }

        .remove-btn {
            width: 28px;
            height: 28px;
            background: var(--accent-danger);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-tip {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            padding: 20px;
        }

        /* 消息提示 */
        .message {
            text-align: center;
            margin-top: var(--gap-sm);
            font-size: 14px;
            padding: 8px;
            border-radius: var(--radius-sm);
        }

        .error {
            background: rgba(255, 71, 87, 0.1);
            color: var(--accent-danger);
        }

        .success {
            background: rgba(0, 212, 170, 0.1);
            color: var(--accent-primary);
        }

        /* 状态指示 */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: var(--gap-sm);
            justify-content: center;
            margin-bottom: var(--gap-md);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--status-active);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            color: var(--accent-primary);
            font-size: 14px;
        }

        .hidden {
            display: none !important;
        }

        /* 暗黑模式切换按钮 */
        .theme-toggle {
            position: fixed;
            top: var(--gap-md);
            right: var(--gap-md);
            width: 40px;
            height: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 18px;
        }
    </style>
</head>
<body>
    <!-- 主题切换按钮 -->
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
        <span id="themeIcon">☀️</span>
    </button>

    <!-- 顶部导航条 -->
    <div class="topbar">
        <span class="topbar-title">NETWORK AUTOMATION SYSTEM</span>
        <span class="topbar-accent">扫码枪终端</span>
    </div>

    <!-- 加入会话阶段 -->
    <div id="joinPhase" class="container">
        <h1>扫码枪终端</h1>
        <p class="tip">扫描PC端二维码，或手动输入会话码</p>
        <input
            type="text"
            id="sessionInput"
            placeholder="扫描二维码或输入会话码"
            autofocus
        >
        <button class="btn btn-primary" id="joinBtn" onclick="joinSession()">加入会话</button>
        <p id="joinError" class="message error hidden"></p>
    </div>

    <!-- 扫码阶段 -->
    <div id="scanPhase" class="container hidden">
        <div class="session-info">
            <div class="session-type-badge" id="sessionTypeBadge">入库扫描</div>
            <p>会话码: <span class="session-code" id="sessionCode"></span></p>
        </div>

        <div class="status-indicator">
            <div class="status-dot"></div>
            <span class="status-text">扫码枪已连接</span>
        </div>

        <input
            type="text"
            id="serialInput"
            placeholder="扫描备件序列号"
            autofocus
        >
        <button class="btn btn-primary" id="scanBtn" onclick="scanSerial()">确认扫描</button>

        <div class="scan-list">
            <h3>
                已扫描
                <span class="item-count" id="itemCount">0</span>
                项
            </h3>
            <div id="itemsList"></div>
            <p id="emptyTip" class="empty-tip">等待扫描...</p>
        </div>

        <button class="btn btn-danger" onclick="exitSession()">退出会话</button>
        <p id="scanError" class="message error hidden"></p>
        <p id="scanSuccess" class="message success hidden"></p>
    </div>

    <script>
        // API 基础路径
        const API_BASE = window.location.origin + '/api';

        // 状态
        let sessionCode = '';
        let sessionType = '';
        let scannedItems = [];

        // DOM 元素
        const joinPhase = document.getElementById('joinPhase');
        const scanPhase = document.getElementById('scanPhase');
        const sessionInput = document.getElementById('sessionInput');
        const serialInput = document.getElementById('serialInput');
        const joinError = document.getElementById('joinError');
        const scanError = document.getElementById('scanError');
        const scanSuccess = document.getElementById('scanSuccess');

        // 主题切换
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            if (body.classList.contains('dark')) {
                body.classList.remove('dark');
                icon.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.add('dark');
                icon.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            }
        }

        // 初始化主题
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const icon = document.getElementById('themeIcon');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark');
                icon.textContent = '🌙';
            }
        }

        // 解析扫码内容
        function parseScanContent(content) {
            if (content.startsWith('NAS-SCAN:')) {
                return content.substring(9);
            }
            return content.trim().toUpperCase();
        }

        // 显示错误
        function showError(element, message) {
            element.textContent = message;
            element.classList.remove('hidden');
        }

        // 显示成功
        function showSuccess(message) {
            scanSuccess.textContent = message;
            scanSuccess.classList.remove('hidden');
            setTimeout(() => {
                scanSuccess.classList.add('hidden');
            }, 2000);
        }

        // 清除提示
        function clearMessages() {
            joinError.classList.add('hidden');
            scanError.classList.add('hidden');
        }

        // 加入会话
        async function joinSession() {
            clearMessages();
            const code = parseScanContent(sessionInput.value);
            if (!code) {
                showError(joinError, '请输入有效会话码');
                return;
            }

            try {
                const response = await fetch(API_BASE + '/scan/sessions/join', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_code: code })
                });

                if (!response.ok) {
                    const error = await response.json();
                    showError(joinError, error.detail || '加入失败');
                    return;
                }

                const result = await response.json();
                sessionCode = code;
                sessionType = result.session_type;

                // 更新界面
                document.getElementById('sessionCode').textContent = sessionCode;
                const typeTexts = { in: '入库扫描', out: '出库扫描', maintenance: '维修备件', task: '运维任务' };
                document.getElementById('sessionTypeBadge').textContent = typeTexts[sessionType] || '扫描';

                // 获取已有项目
                await refreshSession();

                // 切换界面
                joinPhase.classList.add('hidden');
                scanPhase.classList.remove('hidden');
                serialInput.focus();
            } catch (e) {
                showError(joinError, '网络错误: ' + e.message);
            }
        }

        // 刷新会话状态
        async function refreshSession() {
            try {
                const response = await fetch(API_BASE + '/scan/sessions/' + sessionCode);
                if (response.ok) {
                    const result = await response.json();
                    scannedItems = result.items || [];
                    updateItemsList();
                }
            } catch (e) {
                console.error('刷新失败:', e);
            }
        }

        // 扫描序列号
        async function scanSerial() {
            clearMessages();
            const sn = serialInput.value.trim();
            if (!sn) return;

            try {
                const response = await fetch(API_BASE + '/scan/sessions/items', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_code: sessionCode,
                        serial_number: sn,
                        quantity: 1
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    showError(scanError, error.detail || '扫描失败');
                    return;
                }

                const result = await response.json();

                // 添加到列表
                const existing = scannedItems.find(i => i.serial_number === sn);
                if (existing) {
                    existing.quantity += 1;
                } else {
                    scannedItems.push({
                        serial_number: sn,
                        part_id: result.item.part_id,
                        name: result.item.name,
                        part_number: result.item.part_number,
                        unit_price: result.item.unit_price,
                        quantity: 1
                    });
                }

                updateItemsList();
                showSuccess(result.found_in_stock ? '已添加: ' + result.item.name : '序列号已记录（未匹配库存）');
                serialInput.value = '';
                serialInput.focus();
            } catch (e) {
                showError(scanError, '网络错误: ' + e.message);
            }
        }

        // 更新列表显示
        function updateItemsList() {
            const listEl = document.getElementById('itemsList');
            const countEl = document.getElementById('itemCount');
            const emptyTip = document.getElementById('emptyTip');

            countEl.textContent = scannedItems.length;

            if (scannedItems.length === 0) {
                listEl.innerHTML = '';
                emptyTip.classList.remove('hidden');
                return;
            }

            emptyTip.classList.add('hidden');
            listEl.innerHTML = scannedItems.map((item, index) => `
                <div class="item-card">
                    <div class="item-info">
                        <span class="serial">${item.serial_number}</span>
                        <span class="name">${item.name || '未匹配'}</span>
                        <span class="qty">数量: ${item.quantity}</span>
                    </div>
                    <button class="remove-btn" onclick="removeItem(${index})">×</button>
                </div>
            `).join('');
        }

        // 移除项目
        function removeItem(index) {
            scannedItems.splice(index, 1);
            updateItemsList();
        }

        // 退出会话
        function exitSession() {
            sessionCode = '';
            sessionType = '';
            scannedItems = [];
            sessionInput.value = '';
            serialInput.value = '';

            scanPhase.classList.add('hidden');
            joinPhase.classList.remove('hidden');
            sessionInput.focus();
        }

        // 回车事件
        sessionInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') joinSession();
        });

        serialInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') scanSerial();
        });

        // 初始化主题
        initTheme();
    </script>
</body>
</html>
