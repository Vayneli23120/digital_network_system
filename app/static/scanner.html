<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫码枪终端</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 16px;
        }
        h2 {
            font-size: 20px;
            text-align: center;
            color: #409eff;
            margin-bottom: 8px;
        }
        .tip {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .session-info {
            text-align: center;
            margin-bottom: 16px;
        }
        .session-info p {
            color: #666;
            font-size: 14px;
        }
        input {
            width: 100%;
            height: 48px;
            font-size: 18px;
            padding: 8px 12px;
            border: 2px solid #409eff;
            border-radius: 4px;
            outline: none;
        }
        input:focus {
            border-color: #66b1ff;
        }
        button {
            width: 100%;
            height: 48px;
            font-size: 18px;
            background: #409eff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 12px;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        button.exit-btn {
            background: #f56c6c;
            margin-top: 20px;
        }
        .scan-list {
            background: #f9f9f9;
            padding: 16px;
            border-radius: 4px;
            min-height: 100px;
            margin-top: 16px;
        }
        .scan-list h3 {
            font-size: 16px;
            margin-bottom: 12px;
        }
        .item-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid #eee;
            margin-bottom: 8px;
        }
        .item-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .serial {
            font-weight: bold;
            font-size: 16px;
        }
        .name {
            color: #666;
            font-size: 14px;
        }
        .qty {
            color: #409eff;
            font-size: 12px;
        }
        .remove-btn {
            width: 32px;
            height: 32px;
            background: #f56c6c;
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
        }
        .empty-tip {
            text-align: center;
            color: #999;
        }
        .error {
            color: #f56c6c;
            text-align: center;
            margin-top: 12px;
        }
        .success {
            color: #67c23a;
            text-align: center;
            margin-top: 12px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 加入会话阶段 -->
    <div id="joinPhase" class="container">
        <h1>扫码枪终端</h1>
        <p class="tip">扫描PC端二维码，或手动输入会话码</p>
        <input
            type="text"
            id="sessionInput"
            placeholder="扫描二维码或输入会话码"
            autofocus
        >
        <button id="joinBtn" onclick="joinSession()">加入会话</button>
        <p id="joinError" class="error hidden"></p>
    </div>

    <!-- 扫码阶段 -->
    <div id="scanPhase" class="container hidden">
        <div class="session-info">
            <h2 id="sessionType">入库扫描</h2>
            <p>会话码: <span id="sessionCode"></span></p>
        </div>

        <input
            type="text"
            id="serialInput"
            placeholder="扫描备件序列号"
            autofocus
        >
        <button id="scanBtn" onclick="scanSerial()">确认扫描</button>

        <div class="scan-list">
            <h3>已扫描 <span id="itemCount">0</span> 项</h3>
            <div id="itemsList"></div>
            <p id="emptyTip" class="empty-tip">等待扫描...</p>
        </div>

        <button class="exit-btn" onclick="exitSession()">退出会话</button>
        <p id="scanError" class="error hidden"></p>
        <p id="scanSuccess" class="success hidden"></p>
    </div>

    <script>
        // API 基础路径
        const API_BASE = window.location.origin + '/api';

        // 状态
        let sessionCode = '';
        let sessionType = '';
        let scannedItems = [];

        // DOM 元素
        const joinPhase = document.getElementById('joinPhase');
        const scanPhase = document.getElementById('scanPhase');
        const sessionInput = document.getElementById('sessionInput');
        const serialInput = document.getElementById('serialInput');
        const joinError = document.getElementById('joinError');
        const scanError = document.getElementById('scanError');
        const scanSuccess = document.getElementById('scanSuccess');

        // 解析扫码内容
        function parseScanContent(content) {
            if (content.startsWith('NAS-SCAN:')) {
                return content.substring(9);
            }
            return content.trim().toUpperCase();
        }

        // 显示错误
        function showError(element, message) {
            element.textContent = message;
            element.classList.remove('hidden');
        }

        // 显示成功
        function showSuccess(message) {
            scanSuccess.textContent = message;
            scanSuccess.classList.remove('hidden');
            setTimeout(() => {
                scanSuccess.classList.add('hidden');
            }, 2000);
        }

        // 清除提示
        function clearMessages() {
            joinError.classList.add('hidden');
            scanError.classList.add('hidden');
        }

        // 加入会话
        async function joinSession() {
            clearMessages();
            const code = parseScanContent(sessionInput.value);
            if (!code) {
                showError(joinError, '请输入有效会话码');
                return;
            }

            try {
                const response = await fetch(API_BASE + '/scan/sessions/join', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_code: code })
                });

                if (!response.ok) {
                    const error = await response.json();
                    showError(joinError, error.detail || '加入失败');
                    return;
                }

                const result = await response.json();
                sessionCode = code;
                sessionType = result.session_type;

                // 更新界面
                document.getElementById('sessionCode').textContent = sessionCode;
                const typeTexts = { in: '入库扫描', out: '出库扫描', maintenance: '维修备件', task: '运维任务' };
                document.getElementById('sessionType').textContent = typeTexts[sessionType] || '扫描';

                // 获取已有项目
                await refreshSession();

                // 切换界面
                joinPhase.classList.add('hidden');
                scanPhase.classList.remove('hidden');
                serialInput.focus();
            } catch (e) {
                showError(joinError, '网络错误: ' + e.message);
            }
        }

        // 刷新会话状态
        async function refreshSession() {
            try {
                const response = await fetch(API_BASE + '/scan/sessions/' + sessionCode);
                if (response.ok) {
                    const result = await response.json();
                    scannedItems = result.items || [];
                    updateItemsList();
                }
            } catch (e) {
                console.error('刷新失败:', e);
            }
        }

        // 扫描序列号
        async function scanSerial() {
            clearMessages();
            const sn = serialInput.value.trim();
            if (!sn) return;

            try {
                const response = await fetch(API_BASE + '/scan/sessions/items', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_code: sessionCode,
                        serial_number: sn,
                        quantity: 1
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    showError(scanError, error.detail || '扫描失败');
                    return;
                }

                const result = await response.json();

                // 添加到列表
                const existing = scannedItems.find(i => i.serial_number === sn);
                if (existing) {
                    existing.quantity += 1;
                } else {
                    scannedItems.push({
                        serial_number: sn,
                        part_id: result.item.part_id,
                        name: result.item.name,
                        part_number: result.item.part_number,
                        unit_price: result.item.unit_price,
                        quantity: 1
                    });
                }

                updateItemsList();
                showSuccess(result.found_in_stock ? '已添加: ' + result.item.name : '序列号已记录（未匹配库存）');
                serialInput.value = '';
                serialInput.focus();
            } catch (e) {
                showError(scanError, '网络错误: ' + e.message);
            }
        }

        // 更新列表显示
        function updateItemsList() {
            const listEl = document.getElementById('itemsList');
            const countEl = document.getElementById('itemCount');
            const emptyTip = document.getElementById('emptyTip');

            countEl.textContent = scannedItems.length;

            if (scannedItems.length === 0) {
                listEl.innerHTML = '';
                emptyTip.classList.remove('hidden');
                return;
            }

            emptyTip.classList.add('hidden');
            listEl.innerHTML = scannedItems.map((item, index) => `
                <div class="item-card">
                    <div class="item-info">
                        <span class="serial">${item.serial_number}</span>
                        <span class="name">${item.name || '未匹配'}</span>
                        <span class="qty">数量: ${item.quantity}</span>
                    </div>
                    <button class="remove-btn" onclick="removeItem(${index})">×</button>
                </div>
            `).join('');
        }

        // 移除项目
        function removeItem(index) {
            scannedItems.splice(index, 1);
            updateItemsList();
        }

        // 退出会话
        function exitSession() {
            sessionCode = '';
            sessionType = '';
            scannedItems = [];
            sessionInput.value = '';
            serialInput.value = '';

            scanPhase.classList.add('hidden');
            joinPhase.classList.remove('hidden');
            sessionInput.focus();
        }

        // 回车事件
        sessionInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') joinSession();
        });

        serialInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') scanSerial();
        });
    </script>
</body>
</html>
