# Nginx 双前端路由配置
# Vue3 (legacy) 和 React (new) 并行运行

upstream nas-backend {
    server nas-backend:8000;
}

upstream nas-frontend-vue {
    server nas-frontend-vue:3000;
}

upstream nas-frontend-react {
    server nas-frontend-react:80;
}

server {
    listen 80;

    # 新前端（React）— AI 分析、作业监控、变更管理
    location ~ ^/(ai-analysis|jobs|changes|device-health) {
        proxy_pass http://nas-frontend-react;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 旧前端（Vue 3）— 其他模块
    location / {
        proxy_pass http://nas-frontend-vue;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API 代理
    location /api {
        proxy_pass http://nas-backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # 健康检查
    location /health {
        proxy_pass http://nas-backend;
    }

    location /ready {
        proxy_pass http://nas-backend;
    }

    # 静态资源
    location /assets {
        proxy_pass http://nas-frontend-vue;
    }

    location /photos {
        proxy_pass http://nas-backend;
    }
}